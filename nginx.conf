server {
    listen 80;
    server_name eddva.in www.eddva.in;
    root /var/www/eddva_frontend;
    index index.html;

    # ── index.html: NEVER cache ───────────────────────────────────────────────
    # This ensures users always get the new index.html after a deploy,
    # which points to the correct chunk filenames (content-hashed by Vite).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        try_files $uri =404;
    }

    # ── /assets/: cache forever (Vite content-hashes every filename) ─────────
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback: all other routes serve index.html ───────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
