name: Deploy Frontend (DEV)

on:
  push:
    branches: [dev]

jobs:
  deploy:
    name: Build & Deploy Frontend (DEV)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for DEV
        run: NODE_OPTIONS="--max-old-space-size=3072" npm run build
        env:
          VITE_API_BASE_URL: https://dev.eddva.in/api/v1
          VITE_BACKEND_URL: https://dev.eddva.in/api/v1
          VITE_SOCKET_URL: https://dev.eddva.in
          VITE_AI_URL: https://dev-ai.eddva.in
          VITE_APP_ENV: development
          VITE_AGORA_APP_ID: ${{ secrets.VITE_AGORA_APP_ID }}
          VITE_SARVAM_API_KEY: ${{ secrets.VITE_SARVAM_API_KEY }}

      - name: Get runner IP and open EC2 security group
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --description "GitHub Actions runner (auto-removed)" || true

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy & deploy via rsync + SSH (DEV)
        run: |
          rsync -az --delete dist/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/eddva_dev_deploy/
          rsync -az nginx.conf ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/eddva_nginx.conf
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            set -e
            sudo mkdir -p /var/www/eddva_dev /var/www/eddva_frontend /var/www/certbot
            sudo rsync -a --delete /tmp/eddva_dev_deploy/ /var/www/eddva_dev/
            sudo rsync -a --delete /tmp/eddva_dev_deploy/ /var/www/eddva_frontend/
            sudo chown -R www-data:www-data /var/www/eddva_dev /var/www/eddva_frontend
            sudo chmod -R 755 /var/www/eddva_dev /var/www/eddva_frontend

            sudo rm -f /etc/nginx/conf.d/*.conf /etc/nginx/sites-enabled/default 2>/dev/null || true
            sudo cp /tmp/eddva_nginx.conf /etc/nginx/sites-available/eddva.conf
            sudo sed -i "s|root /var/www/eddva_frontend;|root /var/www/eddva_dev;|g" /etc/nginx/sites-available/eddva.conf
            sudo cp /etc/nginx/sites-available/eddva.conf /etc/nginx/sites-available/dev.conf 2>/dev/null || true
            sudo ln -sf /etc/nginx/sites-available/eddva.conf /etc/nginx/sites-enabled/eddva.conf
            sudo ln -sf /etc/nginx/sites-available/dev.conf /etc/nginx/sites-enabled/dev.conf 2>/dev/null || true

            if sudo command -v certbot >/dev/null 2>&1; then
              sudo certbot certonly --webroot \
                -w /var/www/certbot \
                -d eddva.in -d www.eddva.in -d dev.eddva.in \
                --non-interactive --agree-tos -m admin@eddva.in \
                --expand --keep-until-expiring || echo "Certbot expansion skipped"
            fi

            sudo nginx -t && sudo systemctl restart nginx
            rm -rf /tmp/eddva_dev_deploy /tmp/eddva_nginx.conf
            echo "DEV Frontend deployed to dev.eddva.in at $(date)"
          '

      - name: Remove runner IP from EC2 security group
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" || true
