name: Deploy Frontend (DEV)

on:
  push:
    branches: [dev]

jobs:
  deploy:
    name: Build & Deploy Frontend (DEV)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for DEV
        run: NODE_OPTIONS="--max-old-space-size=3072" npm run build
        env:
          VITE_API_BASE_URL: https://dev-api.eddva.in/api/v1
          VITE_BACKEND_URL: https://dev-api.eddva.in/api/v1
          VITE_SOCKET_URL: https://dev-api.eddva.in
          VITE_AI_URL: https://dev-ai.eddva.in
          VITE_APP_ENV: development
          VITE_AGORA_APP_ID: ${{ secrets.VITE_AGORA_APP_ID }}
          VITE_SARVAM_API_KEY: ${{ secrets.VITE_SARVAM_API_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy & deploy via rsync + SSH (DEV)
        run: |
          rsync -az --delete dist/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/eddva_dev_deploy/
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash -s <<'ENDSSH'
            set -e
            sudo mkdir -p /var/www/eddva_dev
            sudo rm -rf /var/www/eddva_dev/*
            sudo mv /tmp/eddva_dev_deploy/* /var/www/eddva_dev/
            sudo chown -R www-data:www-data /var/www/eddva_dev
            sudo chmod -R 755 /var/www/eddva_dev
            sudo nginx -t && sudo systemctl reload nginx
            echo "DEV Frontend deployed to dev.eddva.in at $(date)"
          ENDSSH
