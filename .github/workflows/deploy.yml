name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create .env.production
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=https://api.eddva.in/api/v1
          VITE_SOCKET_URL=https://api.eddva.in
          VITE_AGORA_APP_ID=${{ secrets.VITE_AGORA_APP_ID }}
          VITE_SARVAM_API_KEY=${{ secrets.VITE_SARVAM_API_KEY }}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.APP_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.APP_SERVER_SSH_KEY }}
          source: "dist/"
          target: "/var/www/eddva-frontend/"
          strip_components: 0

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.APP_SERVER_SSH_KEY }}
          script: sudo systemctl reload nginx

      - name: Notify success
        if: success()
        run: echo "Frontend deployed to https://eddva.in ✓"
