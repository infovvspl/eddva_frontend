name: Deploy Frontend to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          VITE_API_BASE_URL: https://eddva.in/api/v1
          VITE_BACKEND_URL: https://eddva.in/api/v1
          VITE_SOCKET_URL: https://eddva.in
          VITE_AI_URL: https://ai.eddva.in
          VITE_APP_ENV: production
          VITE_AGORA_APP_ID: ${{ secrets.VITE_AGORA_APP_ID }}
          VITE_SARVAM_API_KEY: ${{ secrets.VITE_SARVAM_API_KEY }}

      - name: Get runner IP and open EC2 security group
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --description "GitHub Actions runner (auto-removed)" || true

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy & deploy via rsync + SSH
        run: |
          # 1. Upload built frontend assets
          rsync -az --delete dist/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/eddva_frontend_deploy/

          # 2. Upload nginx config
          rsync -az nginx.conf ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/eddva_nginx.conf

          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            set -e

            # ── Deploy frontend files ──────────────────────────────────────
            sudo rm -rf /var/www/eddva_frontend
            sudo mv /tmp/eddva_frontend_deploy /var/www/eddva_frontend
            sudo chown -R www-data:www-data /var/www/eddva_frontend
            sudo chmod -R 755 /var/www/eddva_frontend

            # ── Deploy nginx config ────────────────────────────────────────
            sudo mkdir -p /var/www/certbot
            sudo cp /tmp/eddva_nginx.conf /etc/nginx/sites-available/eddva.conf
            sudo ln -sf /etc/nginx/sites-available/eddva.conf /etc/nginx/sites-enabled/eddva.conf
            sudo rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true

            # ── Obtain / renew SSL cert (skips if cert is still valid) ────
            if ! sudo test -f /etc/letsencrypt/live/eddva.in/fullchain.pem; then
              echo "No SSL cert found — requesting via certbot..."
              sudo apt-get install -y certbot python3-certbot-nginx 2>/dev/null || true
              # Temporarily use HTTP-only config so certbot ACME challenge works
              sudo sed -i "s|listen 443 ssl;||g; s|listen \[::\]:443 ssl;||g; s|http2 on;||g; /ssl_/d" \
                /etc/nginx/sites-available/eddva.conf
              sudo nginx -t && sudo systemctl reload nginx || true
              sudo certbot certonly --webroot \
                -w /var/www/certbot \
                -d eddva.in -d www.eddva.in \
                --non-interactive --agree-tos -m admin@eddva.in \
                --keep-until-expiring || echo "Certbot failed — check DNS and port 80"
              # Restore full HTTPS config
              sudo cp /tmp/eddva_nginx.conf /etc/nginx/sites-available/eddva.conf
            else
              echo "SSL cert exists — attempting renewal if expiring soon..."
              sudo certbot renew --quiet --no-self-upgrade || true
            fi

            # ── Validate and reload nginx ──────────────────────────────────
            sudo nginx -t && sudo systemctl reload nginx
            echo "Frontend deployed successfully at $(date)"
          '

      - name: Remove runner IP from EC2 security group
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" || true
